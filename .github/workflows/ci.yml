# CI for mlx-yolos.
#
# Runs on `ubuntu-latest`, which is free and unmetered for public GitHub
# repositories. The package itself is Mac-only at runtime (MLX needs Metal),
# so CI only covers what makes sense on Linux: static analysis and the few
# CPU-only unit tests (letterbox math, converter name-mapping). The MLX
# inference path is tested locally on Apple Silicon.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so we don't queue duplicates.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Read-only token; this repo doesn't need write access from CI.
permissions:
  contents: read

jobs:
  lint-and-cpu-tests:
    name: lint + CPU-only tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Install everything ubuntu can actually load (numpy, opencv,
          # ruff, pytest), then install our package with `--no-deps` so
          # ubuntu doesn't try to pull in `mlx` (which can't load without
          # Metal). The CPU-only tests we run here don't import the mlx
          # side, so this is enough to lint and exercise letterbox math.
          pip install numpy 'opencv-python-headless>=4.7' pyyaml safetensors
          pip install ruff pytest
          pip install -e . --no-deps
      - name: ruff
        run: ruff check src tests scripts
      - name: pytest (CPU tests only)
        # test_converter and test_letterbox use only numpy + cv2; they
        # don't import the mlx-requiring engine/nn modules.
        run: pytest -q tests/test_letterbox.py tests/test_converter.py
