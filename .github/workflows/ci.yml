# CI for mlx-yolos.
#
# Both jobs run on `ubuntu-latest`, which is free and unmetered for public
# GitHub repositories. We deliberately avoid macOS / large runners since
# only those can incur charges on a public repo.
#
# Two jobs:
#   * lint-and-test — ruff + pytest (numpy path; MLX-only tests auto-skip).
#   * parity        — convert the released yolov8n-pose.pt to MLX
#                     safetensors and run scripts/validate_yolov8_pose.py.
#                     Hard-fails the build on parameter-tree mismatch or
#                     forward-output drift > 1e-3 vs Ultralytics.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so we don't queue duplicates.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Read-only token; this repo doesn't need write access from CI.
permissions:
  contents: read

jobs:
  lint-and-test:
    name: lint + tests (numpy path)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: ruff
        run: ruff check src tests
      - name: pytest
        run: pytest -q

  parity:
    name: numerical parity vs Ultralytics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      # CPU-only torch keeps the install footprint small; we don't need CUDA
      # for this end-to-end conversion + numerical-parity check.
      - name: Install (convert extras + CPU torch wheel)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -e '.[convert]'
      - name: Cache yolov8n-pose.pt
        id: pt
        uses: actions/cache@v4
        with:
          path: /tmp/yolov8n-pose.pt
          key: yolov8n-pose-v8.3.0
      - name: Download yolov8n-pose.pt
        if: steps.pt.outputs.cache-hit != 'true'
        run: |
          curl -L -o /tmp/yolov8n-pose.pt \
            https://github.com/ultralytics/assets/releases/download/v8.3.0/yolov8n-pose.pt
      - name: Convert weights
        run: |
          mlx-yolos convert \
            --pt /tmp/yolov8n-pose.pt \
            --out /tmp/mlx-yolos-yolov8n-pose.safetensors
      - name: Download bus.jpg
        run: |
          curl -L -o /tmp/bus.jpg \
            https://raw.githubusercontent.com/ultralytics/ultralytics/main/ultralytics/assets/bus.jpg
      - name: Run validate_yolov8_pose.py
        env:
          IMAGE_PATH: /tmp/bus.jpg
        # Hard-fail on regressions: parameter-tree mismatch or numerical
        # drift greater than 1e-3 max abs vs the official Ultralytics output.
        run: |
          python scripts/validate_yolov8_pose.py | tee validate.log
          grep -q 'missing in safetensors: 0' validate.log
          grep -q 'extra in safetensors: 0'   validate.log
          awk '/^max abs diff:/ {
                 if ($4 + 0 > 0.001) {
                   print "FAIL: max abs diff "$4" > 1e-3"; exit 1
                 }
                 print "OK: max abs diff "$4
               }' validate.log
